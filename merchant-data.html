<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkUni | Merchant Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF5722;--orange-light:rgba(255,87,34,0.10);--orange-border:rgba(255,87,34,0.28);
  --bg:#0D0D0D;--surface:#111;--card:#181818;--border:#222;
  --white:#fff;--muted:#555;--text:#CCC;
}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--white);-webkit-font-smoothing:antialiased}

/* ── AUTH ── */
#auth-wall{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.auth-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:40px 36px;width:340px;text-align:center}
.auth-logo{font-size:26px;font-weight:900;margin-bottom:6px;letter-spacing:-0.5px}
.auth-logo .think{color:var(--white);font-style:normal}
.auth-logo .uni{color:var(--orange);font-style:italic}
.auth-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.auth-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-family:'Poppins',sans-serif;font-size:14px;color:var(--white);outline:none;margin-bottom:10px;transition:border-color 200ms}
.auth-input:focus{border-color:var(--orange)}
.auth-input::placeholder{color:var(--muted)}
.auth-btn{width:100%;background:var(--orange);color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background 200ms}
.auth-btn:hover{background:#E04A1C}
.auth-error{font-size:11px;color:#FF4444;margin-top:8px;display:none}
.auth-error.show{display:block}

/* ── APP ── */
#app{display:none}
#app.visible{display:block}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.h-left{display:flex;align-items:center;gap:14px}
.logo{font-size:20px;font-weight:900;letter-spacing:-0.5px}
.logo .think{color:var(--white);font-style:normal}
.logo .uni{color:var(--orange);font-style:italic}
.h-badge{background:var(--orange-light);border:1px solid var(--orange-border);color:var(--orange);font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.h-right{display:flex;align-items:center;gap:8px}
#last-updated{font-size:11px;color:var(--muted);margin-right:4px}
.btn-icon{background:var(--card);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:7px 14px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 180ms}
.btn-icon:hover{border-color:var(--orange);color:var(--orange)}
.btn-icon svg{flex-shrink:0}
.btn-primary{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 180ms}
.btn-primary:hover{background:#E04A1C}

/* ── MAIN ── */
main{padding:24px 28px;max-width:1800px;margin:0 auto}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-card.accent{border-color:var(--orange-border);background:var(--orange-light)}
.stat-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:28px;font-weight:900;line-height:1;margin-bottom:3px}
.stat-val.orange{color:var(--orange)}
.stat-val.green{color:#4CAF50}
.stat-val.yellow{color:#FFC107}
.stat-val.gray{color:#666}
.stat-sub{font-size:10px;color:var(--muted)}

/* ── CHARTS ── */
.charts-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:1200px){.charts-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:18px}
.chart-title{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-row:last-child{margin-bottom:0}
.bar-label{font-size:11px;color:var(--text);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:18px;background:var(--surface);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--orange);border-radius:4px;transition:width 700ms ease;min-width:2px}
.bar-fill.green{background:#4CAF50}
.bar-fill.yellow{background:#FFC107}
.bar-fill.gray{background:#444}
.bar-count{font-size:10px;font-weight:600;color:var(--text);width:24px;text-align:right;flex-shrink:0}

/* ── TABLE SECTION ── */
.table-section{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.toolbar{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-box{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'Poppins',sans-serif;font-size:12px;color:var(--white);outline:none;width:200px;transition:border-color 180ms}
.search-box:focus{border-color:var(--orange)}
.search-box::placeholder{color:var(--muted)}
.filter-sel{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'Poppins',sans-serif;font-size:12px;color:var(--text);outline:none;cursor:pointer;transition:border-color 180ms}
.filter-sel:focus{border-color:var(--orange)}
.tbl-count{font-size:11px;color:var(--muted);margin-left:auto}

.table-wrap{overflow-x:auto;max-height:560px;overflow-y:auto}
.table-wrap::-webkit-scrollbar{width:6px;height:6px}
.table-wrap::-webkit-scrollbar-track{background:var(--surface)}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.table-wrap::-webkit-scrollbar-thumb:hover{background:var(--orange)}

table{width:100%;border-collapse:collapse;min-width:2200px;font-size:12px}
thead{position:sticky;top:0;background:#151515;z-index:5}
th{padding:9px 14px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:color 180ms}
th:hover,th.sort-asc,th.sort-desc{color:var(--orange)}
th.sort-asc::after{content:' ↑'}
th.sort-desc::after{content:' ↓'}
td{padding:9px 14px;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,87,34,0.04)}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.3px}
.badge.HIGH{background:rgba(76,175,80,0.15);color:#4CAF50;border:1px solid rgba(76,175,80,0.25)}
.badge.MEDIUM{background:rgba(255,193,7,0.15);color:#FFC107;border:1px solid rgba(255,193,7,0.25)}
.badge.LOW{background:rgba(100,100,100,0.15);color:#666;border:1px solid rgba(100,100,100,0.25)}
.badge.yes{background:rgba(255,87,34,0.15);color:var(--orange)}
.badge.maybe{background:rgba(255,193,7,0.12);color:#FFC107}
.badge.not_now{background:rgba(100,100,100,0.12);color:#666}

.score-dots{display:inline-flex;gap:2px;align-items:center}
.dot-pip{width:6px;height:6px;border-radius:50%;background:var(--border)}
.dot-pip.on{background:var(--orange)}

/* ── STATES ── */
.loading-state{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--muted)}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 700ms linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-wall">
  <div class="auth-card">
    <div class="auth-logo"><span class="think">think</span><span class="uni">uni</span></div>
    <div class="auth-sub">Merchant Data Dashboard</div>
    <input type="password" class="auth-input" id="pwd" placeholder="Enter dashboard password" autocomplete="current-password">
    <button class="auth-btn" onclick="checkAuth()">Access Dashboard</button>
    <div class="auth-error" id="auth-error">Wrong password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="h-left">
      <div class="logo"><span class="think">think</span><span class="uni">uni</span></div>
      <div class="h-badge">Merchant Data</div>
    </div>
    <div class="h-right">
      <span id="last-updated"></span>
      <button class="btn-icon" onclick="loadData()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh
      </button>
      <button class="btn-primary" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
  </header>

  <main>
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="loading-state"><div class="spinner"></div></div></div>
    </div>

    <div class="charts-grid" id="charts-grid"></div>

    <div class="table-section">
      <div class="toolbar">
        <input type="text" class="search-box" id="q" placeholder="Search business, city, name..." oninput="filter()">
        <select class="filter-sel" id="f-tier" onchange="filter()">
          <option value="">All Tiers</option>
          <option value="HIGH">HIGH Leads</option>
          <option value="MEDIUM">MEDIUM Leads</option>
          <option value="LOW">LOW Leads</option>
        </select>
        <select class="filter-sel" id="f-cat" onchange="filter()">
          <option value="">All Categories</option>
          <option value="food">Food &amp; Beverage</option>
          <option value="fashion">Fashion &amp; Apparel</option>
          <option value="beauty">Beauty &amp; Wellness</option>
          <option value="edu">Education</option>
          <option value="events">Events</option>
          <option value="other">Other</option>
        </select>
        <select class="filter-sel" id="f-core" onchange="filter()">
          <option value="">All Answers</option>
          <option value="yes">Yes, let's go</option>
          <option value="maybe">Tell me more</option>
          <option value="not_now">Not right now</option>
        </select>
        <select class="filter-sel" id="f-city" onchange="filter()">
          <option value="">All Cities</option>
        </select>
        <span class="tbl-count" id="tbl-count"></span>
      </div>
      <div class="table-wrap" id="tbl-wrap">
        <div class="loading-state"><div class="spinner"></div> Loading submissions...</div>
      </div>
    </div>
  </main>
</div>

<script>
const SB_URL = 'https://xmqkamzzvoaqfijudlxf.supabase.co';
const SB_KEY = 'sb_publishable_6nyynW9Kb2-zuFHvXXnO2g_edkvNRiP';
const PWD = 'thinkuni2025';

let client, all = [], shown = [], sortCol = 'submitted_at', sortDir = 'desc';

// ── AUTH ──
function checkAuth() {
  const v = document.getElementById('pwd').value;
  if (v === PWD) {
    localStorage.setItem('tu_auth', '1');
    boot();
  } else {
    document.getElementById('auth-error').classList.add('show');
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') checkAuth(); });
if (localStorage.getItem('tu_auth') === '1') boot();

function boot() {
  document.getElementById('auth-wall').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  client = window.supabase.createClient(SB_URL, SB_KEY);
  loadData();
}

// ── LOAD ──
async function loadData() {
  try {
    const { data, error } = await client.from('merchant_submissions').select('*').order('submitted_at', { ascending: false });
    if (error) throw error;
    all = data || [];
    shown = [...all];
    renderStats();
    renderCharts();
    populateCityFilter();
    filter();
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('tbl-wrap').innerHTML = `<div class="empty-state">Error: ${e.message}<br><small>Check Supabase table exists and RLS allows reads.</small></div>`;
    console.error(e);
  }
}

// ── STATS ──
function renderStats() {
  const n = all.length;
  const high = all.filter(r=>r.lead_tier==='HIGH').length;
  const med  = all.filter(r=>r.lead_tier==='MEDIUM').length;
  const low  = all.filter(r=>r.lead_tier==='LOW').length;
  const yes  = all.filter(r=>r.core_answer==='yes').length;
  const avgScore = n ? (all.reduce((s,r)=>s+(r.lead_score||0),0)/n).toFixed(1) : '—';

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card accent">
      <div class="stat-label">Total Submissions</div>
      <div class="stat-val orange">${n}</div>
      <div class="stat-sub">All time</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">HIGH Leads</div>
      <div class="stat-val green">${high}</div>
      <div class="stat-sub">${n?Math.round(high/n*100):0}% of total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">MEDIUM Leads</div>
      <div class="stat-val yellow">${med}</div>
      <div class="stat-sub">${n?Math.round(med/n*100):0}% of total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">LOW Leads</div>
      <div class="stat-val gray">${low}</div>
      <div class="stat-sub">${n?Math.round(low/n*100):0}% of total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Said "Yes, let's go"</div>
      <div class="stat-val orange">${yes}</div>
      <div class="stat-sub">${n?Math.round(yes/n*100):0}% conversion intent</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg. Lead Score</div>
      <div class="stat-val orange">${avgScore}</div>
      <div class="stat-sub">out of 7 max</div>
    </div>
  `;
}

// ── CHARTS ──
function bar(label, count, max, colorClass='') {
  const pct = max ? (count/max*100) : 0;
  return `<div class="bar-row">
    <div class="bar-label" title="${label}">${label}</div>
    <div class="bar-track"><div class="bar-fill ${colorClass}" style="width:${pct}%"></div></div>
    <div class="bar-count">${count}</div>
  </div>`;
}

function counts(arr, key) {
  const c = {};
  arr.forEach(r => { if(r[key]) c[r[key]] = (c[r[key]]||0)+1; });
  return c;
}

function renderCharts() {
  const catMap = {food:'Food & Bev',fashion:'Fashion',beauty:'Beauty',edu:'Education',events:'Events',other:'Other'};
  const catC = counts(all,'category'); const mCat = Math.max(...Object.values(catC),1);
  const coreMap = {yes:"Yes, let's go",maybe:'Tell me more',not_now:'Not right now'};
  const coreC = counts(all,'core_answer'); const mCore = Math.max(...Object.values(coreC),1);
  const speedMap = {this_week:'This week',two_weeks:'Within 2 weeks',one_month:'Within a month',need_approval:'Needs approval'};
  const speedC = counts(all,'launch_speed'); const mSpeed = Math.max(...Object.values(speedC),1);
  const cityC = counts(all,'city');
  const topCities = Object.entries(cityC).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const mCity = topCities.length ? topCities[0][1] : 1;

  document.getElementById('charts-grid').innerHTML = `
    <div class="chart-card">
      <div class="chart-title">Category Distribution</div>
      ${Object.entries(catMap).map(([k,l])=>bar(l,catC[k]||0,mCat)).join('')}
    </div>
    <div class="chart-card">
      <div class="chart-title">Core Answer</div>
      ${bar("Yes, let's go", coreC['yes']||0, mCore, '')}
      ${bar("Tell me more",  coreC['maybe']||0, mCore, 'yellow')}
      ${bar("Not right now", coreC['not_now']||0, mCore, 'gray')}
    </div>
    <div class="chart-card">
      <div class="chart-title">Launch Speed</div>
      ${Object.entries(speedMap).map(([k,l])=>bar(l,speedC[k]||0,mSpeed)).join('')}
    </div>
    <div class="chart-card">
      <div class="chart-title">Top Cities</div>
      ${topCities.length ? topCities.map(([c,n])=>bar(c,n,mCity)).join('') : '<div class="empty-state" style="padding:20px">No data yet</div>'}
    </div>
  `;
}

// ── CITY FILTER ──
function populateCityFilter() {
  const cities = [...new Set(all.map(r=>r.city).filter(Boolean))].sort();
  const sel = document.getElementById('f-city');
  cities.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
}

// ── FILTER ──
function filter() {
  const q   = document.getElementById('q').value.toLowerCase();
  const tier = document.getElementById('f-tier').value;
  const cat  = document.getElementById('f-cat').value;
  const core = document.getElementById('f-core').value;
  const city = document.getElementById('f-city').value;

  shown = all.filter(r => {
    if(q && ![r.business_name,r.contact_name,r.city,r.email,r.whatsapp,r.open_question].some(v=>v&&v.toLowerCase().includes(q))) return false;
    if(tier && r.lead_tier !== tier) return false;
    if(cat  && r.category  !== cat)  return false;
    if(core && r.core_answer !== core) return false;
    if(city && r.city !== city) return false;
    return true;
  });

  sort();
  renderTable();
}

// ── SORT ──
function sort() {
  shown.sort((a,b) => {
    let va = a[sortCol]??'', vb = b[sortCol]??'';
    if(typeof va==='string') va=va.toLowerCase();
    if(typeof vb==='string') vb=vb.toLowerCase();
    return sortDir==='asc' ? (va<vb?-1:va>vb?1:0) : (va>vb?-1:va<vb?1:0);
  });
}

function setSort(col) {
  sortDir = sortCol===col && sortDir==='desc' ? 'asc' : 'desc';
  sortCol = col;
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sort-asc','sort-desc'));
  const th = document.querySelector(`th[data-col="${col}"]`);
  if(th) th.classList.add('sort-'+sortDir);
  sort(); renderTable();
}

// ── TABLE ──
const COLS = [
  {k:'submitted_at',  l:'Date / Time'},
  {k:'lead_tier',     l:'Tier'},
  {k:'lead_score',    l:'Score'},
  {k:'business_name', l:'Business Name'},
  {k:'city',          l:'City'},
  {k:'contact_name',  l:'Contact'},
  {k:'whatsapp',      l:'WhatsApp'},
  {k:'email',         l:'Email'},
  {k:'category',      l:'Category'},
  {k:'other_category',l:'Category (Other)'},
  {k:'gen_z_importance', l:'Gen Z Score'},
  {k:'customer_types',l:'Customer Types'},
  {k:'genz_reach',    l:'Reaching Gen Z?'},
  {k:'pain_points',   l:'Pain Points'},
  {k:'other_pain_description', l:'Pain (Other)'},
  {k:'core_answer',   l:'Core Answer'},
  {k:'value_drivers', l:'Value Drivers'},
  {k:'offer_structures', l:'Offer Types'},
  {k:'offer_model',   l:'Offer Model'},
  {k:'offer_capacity',l:'Offers/Month'},
  {k:'launch_speed',  l:'Launch Speed'},
  {k:'decision_maker',l:'Decision Maker'},
  {k:'contact_method',l:'Preferred Contact'},
  {k:'open_question', l:'Open Answer'},
  {k:'instagram',     l:'Instagram'},
  {k:'website',       l:'Website'},
  {k:'ab_variant',    l:'A/B'},
];

const CAT_L = {food:'Food & Bev',fashion:'Fashion',beauty:'Beauty',edu:'Education',events:'Events',other:'Other'};
const CORE_L = {yes:"Yes, let's go",maybe:'Tell me more',not_now:'Not right now'};
const MODEL_L = {A:'Volume',B:'Fixed Budget',C:'Both'};
const SPEED_L = {this_week:'This week',two_weeks:'2 weeks',one_month:'1 month',need_approval:'Needs approval'};
const REACH_L = {yes_consistently:'Yes, consistently',sometimes:'Sometimes',tried:"Tried, didn't work",not_yet:'Not yet',no:'No'};
const ROLE_L  = {founder:'Founder',co_founder:'Co-founder',marketing:'Marketing',operations:'Operations',manager:'Manager',other_role:'Other'};
const CONTACT_L={whatsapp_contact:'WhatsApp',call:'Call',email_contact:'Email',instagram_dm:'Instagram DM'};

function cellVal(k, v) {
  if(v===null||v===undefined) return '';
  if(k==='submitted_at') return v ? new Date(v).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
  if(k==='lead_tier') return v ? `<span class="badge ${v}">${v}</span>` : '';
  if(k==='lead_score') return `<span class="score-dots">${[...Array(7)].map((_,i)=>`<span class="dot-pip ${i<v?'on':''}"></span>`).join('')}</span> <b>${v}</b>`;
  if(k==='core_answer') return v ? `<span class="badge ${v}">${CORE_L[v]||v}</span>` : '';
  if(k==='category') return CAT_L[v]||v||'';
  if(k==='offer_model') return MODEL_L[v]||v||'';
  if(k==='launch_speed') return SPEED_L[v]||v||'';
  if(k==='genz_reach') return REACH_L[v]||v||'';
  if(k==='decision_maker') return ROLE_L[v]||v||'';
  if(k==='contact_method') return CONTACT_L[v]||v||'';
  if(Array.isArray(v)) return v.join(', ');
  if(typeof v==='object') return JSON.stringify(v);
  return String(v);
}

function renderTable() {
  document.getElementById('tbl-count').textContent = `${shown.length} of ${all.length} rows`;
  if(!shown.length) {
    document.getElementById('tbl-wrap').innerHTML = '<div class="empty-state">No submissions match your filters.</div>';
    return;
  }
  const head = COLS.map(c=>`<th data-col="${c.k}" onclick="setSort('${c.k}')"${sortCol===c.k?' class="sort-'+sortDir+'"':''}>${c.l}</th>`).join('');
  const body = shown.map(row => {
    const cells = COLS.map(c => {
      const raw = cellVal(c.k, row[c.k]);
      const title = String(row[c.k]||'').replace(/"/g,"'");
      return `<td title="${title}">${raw}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');
  document.getElementById('tbl-wrap').innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}

// ── EXPORT CSV ──
function exportCSV() {
  if(!all.length){ alert('No data to export'); return; }
  const headers = COLS.map(c=>c.l);
  const esc = v => {
    if(v===null||v===undefined) return '';
    if(Array.isArray(v)) v=v.join('; ');
    if(typeof v==='object') v=JSON.stringify(v);
    v=String(v).replace(/"/g,'""');
    return /[,"\n]/.test(v) ? `"${v}"` : v;
  };
  const rows = all.map(r => COLS.map(c => esc(r[c.k])).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `thinkuni-merchants-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
